name: Build WahooGPT Toolkit V2

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check executable generators
        shell: bash
        run: |
          set -o pipefail
          node --check scripts/package-spec.js 2>&1 | tee syntax-package-spec.log
          node --check scripts/runtime-templates.js 2>&1 | tee syntax-runtime.log
          node --check scripts/plugin-algorithms-template.js 2>&1 | tee syntax-algorithm-loader.log
          node --check scripts/generate-package.js 2>&1 | tee syntax-generator.log
          node --check scripts/generate-package-runner.js 2>&1 | tee syntax-generator-runner.log

      - name: Generate source package
        run: |
          set +e
          node scripts/generate-package-runner.js > generation.log 2>&1
          code=$?
          echo "$code" > generation.exit.txt
          exit "$code"

      - name: Run package doctor
        working-directory: dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2
        run: |
          set +e
          node scripts/doctor.js > ../../doctor.log 2>&1
          code=$?
          echo "$code" > ../../doctor.exit.txt
          exit "$code"

      - name: Verify manifests
        working-directory: dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2
        run: node scripts/verify-manifests.js

      - name: Verify permissions
        working-directory: dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2
        run: node scripts/verify-permissions.js

      - name: Run all tests
        working-directory: dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2
        run: |
          set +e
          node scripts/run-tests.js > ../../tests.log 2>&1
          code=$?
          echo "$code" > ../../tests.exit.txt
          exit "$code"

      - name: Create ZIP and SHA-256
        working-directory: dist
        run: |
          zip -r -9 WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2.zip WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2
          sha256sum WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2.zip > WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2_SHA256.txt
          unzip -t WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2.zip

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WahooGPT_Toolkit_V2_Diagnostics
          path: |
            *.log
            *.txt
            dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2/VALIDATION_REPORT.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload verified artifact
        uses: actions/upload-artifact@v4
        with:
          name: WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2
          path: |
            dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2.zip
            dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2_SHA256.txt
            dist/WahooGPT_Harici_40_Eklenti_32_Ozellik_Ucretsiz_v2/VALIDATION_REPORT.json
          if-no-files-found: error
          retention-days: 30

  diagnostic-report:
    if: always()
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - name: Download diagnostics
        uses: actions/download-artifact@v4
        with:
          name: WahooGPT_Toolkit_V2_Diagnostics
          path: diagnostics

      - name: Print compact diagnostics
        run: |
          echo '=== SYNTAX LOGS ==='
          for file in diagnostics/syntax-*.log; do
            test -f "$file" || continue
            echo "--- $file"
            cat "$file"
          done
          echo '=== GENERATION EXIT ==='
          cat diagnostics/generation.exit.txt 2>/dev/null || true
          echo '=== GENERATION LOG ==='
          tail -n 120 diagnostics/generation.log 2>/dev/null || true
          echo '=== DOCTOR EXIT ==='
          cat diagnostics/doctor.exit.txt 2>/dev/null || true
          echo '=== DOCTOR LOG ==='
          tail -n 160 diagnostics/doctor.log 2>/dev/null || true
          echo '=== TEST EXIT ==='
          cat diagnostics/tests.exit.txt 2>/dev/null || true
          echo '=== TEST FAILURE INDEX ==='
          grep -n -E 'not ok|AssertionError|ERR_ASSERTION|failureType:|error:|tests [0-9]+|pass [0-9]+|fail [0-9]+' diagnostics/tests.log 2>/dev/null | tail -n 240 || true
          echo '=== TEST LOG TAIL ==='
          tail -n 240 diagnostics/tests.log 2>/dev/null || true
